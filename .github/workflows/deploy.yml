name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-invoice-service
  cancel-in-progress: true

env:
  IMAGE_NAME: invoice-service
  REMOTE_APP_DIR: /opt/invoice-service
  APP_PORT: "3000"
  HOST_PORT: "3000"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main' &&
       contains(github.event.head_commit.message, '[DEPLOY]'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          set -euo pipefail
          docker build --pull -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Save Docker image
        run: |
          set -euo pipefail
          docker save "${IMAGE_NAME}:${GITHUB_SHA}" | gzip > image.tar.gz

      - name: Create runtime env file from GitHub secrets
        env:
          APP_PORT: ${{ secrets.CONTAINER_PORT || secrets.APP_PORT || env.APP_PORT }}
          HOST_PORT: ${{ secrets.HOST_PORT || secrets.APP_PORT || env.HOST_PORT }}
          APP_CONNECTION_STRING: ${{ secrets.APP_CONNECTION_STRING }}
          IDENTITY_BASE_URL: ${{ secrets.IDENTITY_BASE_URL }}
          IDENTITY_CLIENT_ID: ${{ secrets.IDENTITY_CLIENT_ID }}
          IDENTITY_CLIENT_SECRET: ${{ secrets.IDENTITY_CLIENT_SECRET }}
          IDENTITY_CALLBACK_URL: ${{ secrets.IDENTITY_CALLBACK_URL }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
        run: |
          set -euo pipefail

          : "${APP_CONNECTION_STRING:?APP_CONNECTION_STRING is required}"
          : "${IDENTITY_BASE_URL:?IDENTITY_BASE_URL is required}"
          : "${IDENTITY_CLIENT_ID:?IDENTITY_CLIENT_ID is required}"
          : "${IDENTITY_CLIENT_SECRET:?IDENTITY_CLIENT_SECRET is required}"
          : "${IDENTITY_CALLBACK_URL:?IDENTITY_CALLBACK_URL is required}"

          EMAIL_PROVIDER="${EMAIL_PROVIDER:-Brevo}"

          case "${EMAIL_PROVIDER,,}" in
            brevo)
              : "${BREVO_API_KEY:?BREVO_API_KEY is required when EMAIL_PROVIDER=Brevo}"
              : "${BREVO_SENDER_EMAIL:?BREVO_SENDER_EMAIL is required when EMAIL_PROVIDER=Brevo}"
              : "${BREVO_SENDER_NAME:?BREVO_SENDER_NAME is required when EMAIL_PROVIDER=Brevo}"
              ;;
            console)
              ;;
            *)
              echo "Unsupported EMAIL_PROVIDER='${EMAIL_PROVIDER}'. Use 'Brevo' or 'Console'." >&2
              exit 1
              ;;
          esac

          {
            printf 'ASPNETCORE_ENVIRONMENT=%s\n' 'Production'
            printf 'APP_PORT=%s\n' "${APP_PORT}"
            printf 'HOST_PORT=%s\n' "${HOST_PORT}"
            printf 'ASPNETCORE_URLS=%s\n' "http://+:${APP_PORT}"

            printf 'APP_CONNECTION_STRING=%s\n' "${APP_CONNECTION_STRING}"

            printf 'IDENTITY_BASE_URL=%s\n' "${IDENTITY_BASE_URL}"
            printf 'IDENTITY_CLIENT_ID=%s\n' "${IDENTITY_CLIENT_ID}"
            printf 'IDENTITY_CLIENT_SECRET=%s\n' "${IDENTITY_CLIENT_SECRET}"
            printf 'IDENTITY_CALLBACK_URL=%s\n' "${IDENTITY_CALLBACK_URL}"

            printf 'EMAIL_PROVIDER=%s\n' "${EMAIL_PROVIDER}"
            printf 'BREVO_API_KEY=%s\n' "${BREVO_API_KEY}"
            printf 'BREVO_SENDER_EMAIL=%s\n' "${BREVO_SENDER_EMAIL}"
            printf 'BREVO_SENDER_NAME=%s\n' "${BREVO_SENDER_NAME}"
          } > .env

          chmod 600 .env

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "${VPS_PORT:-22}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Upload image and compose files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail

          PORT="${VPS_PORT:-22}"

          ssh -i ~/.ssh/deploy_key -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            "mkdir -p '${REMOTE_APP_DIR}' && chown '${VPS_USER}:${VPS_USER}' '${REMOTE_APP_DIR}'"

          scp -i ~/.ssh/deploy_key -P "${PORT}" \
            image.tar.gz .env docker-compose.yml \
            "${VPS_USER}@${VPS_HOST}:${REMOTE_APP_DIR}/"

      - name: Run docker compose on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          APP_PORT: ${{ secrets.CONTAINER_PORT || secrets.APP_PORT || env.APP_PORT }}
          HOST_PORT: ${{ secrets.HOST_PORT || secrets.APP_PORT || env.HOST_PORT }}
        run: |
          set -euo pipefail

          PORT="${VPS_PORT:-22}"

          ssh -i ~/.ssh/deploy_key -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            IMAGE_TAG="${GITHUB_SHA}" \
            REMOTE_APP_DIR="${REMOTE_APP_DIR}" \
            APP_PORT="${APP_PORT}" \
            HOST_PORT="${HOST_PORT}" \
            'bash -s' <<'EOF_REMOTE'
          set -euo pipefail

          if docker info >/dev/null 2>&1; then
            DOCKER="docker"
          else
            DOCKER="sudo docker"
          fi

          if $DOCKER compose version >/dev/null 2>&1; then
            COMPOSE_CMD=($DOCKER compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD=(docker-compose)
          else
            echo "Docker Compose is required on the target host." >&2
            exit 1
          fi

          cd "$REMOTE_APP_DIR"


          gunzip -c image.tar.gz | $DOCKER load

          chmod 600 .env

          $DOCKER network inspect proxy >/dev/null 2>&1 || $DOCKER network create proxy

          export IMAGE_NAME IMAGE_TAG APP_PORT HOST_PORT
          "${COMPOSE_CMD[@]}" --env-file .env -f docker-compose.yml up -d --remove-orphans

          $DOCKER image prune -f
          EOF_REMOTE
